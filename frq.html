<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .frq-grid {
        display: grid;

        gap: 15px;
        margin-top: 20px;
        }
        .frq-card {
        background: #fff;

        padding: 20px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-weight: 500;
        }

        .frq-card:hover {
        border-color: var(--accent);
        background: #f0f7ff;
        transform: translateY(-2px);
        }
        :root { --primary: #1e293b; --accent: #4f46e5; --bg: #f1f5f9; --success: #16a34a; --danger: #dc2626; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #1e293b; line-height: 1.6; }
        .app-container { width: 100%; max-width: 900px; margin: 2rem auto; background: white; min-height: 90vh; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 1.5rem 2rem; border-bottom: 4px solid var(--accent); }
        .screen { padding: 2rem; flex-grow: 1; }
        .hidden { display: none !important; }
        .prompt-box { background: #fffbeb; padding: 1.5rem; border-radius: 8px; border-left: 5px solid #f59e0b; margin-bottom: 1.5rem; font-size: 1.1rem; }
        textarea { width: 100%; height: 350px; padding: 1rem; border-radius: 8px; border: 2px solid #e2e8f0; font-family: inherit; font-size: 1rem; margin-top: 1rem; box-sizing: border-box; resize: vertical; }
        button { background: var(--accent); color: white; border: none; padding: 16px 32px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 1rem; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #4338ca; transform: translateY(-1px); }
        .feedback-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 1.2rem; border-radius: 8px; margin-top: 1rem; transition: 0.3s; }
        .score-header { font-size: 2rem; font-weight: 800; text-align: center; color: var(--accent); margin-bottom: 1rem; }
        .nav-link { color: #64748b; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1rem; }
        .nav-link:hover { color: var(--accent); }
    </style>
</head>

<div class="app-container">
    <header>

    </div>

    <div id="frq-work-area" class="screen hidden">

        <div id="frq-prompt" class="prompt-box"></div>
        <textarea id="frq-input" placeholder="Label your sections (A, B, C...) and write your full response here..."></textarea>
        <button onclick="gradeFRQ()">Submit for Automated Review</button>
    </div>

    <div id="frq-results" class="screen hidden">

        <div id="frq-feedback-list"></div>

let activeFrq = null;
let seconds = 0;
let frqTimerInterval = null;

// BUILD THE MENU ON LOAD
window.addEventListener('DOMContentLoaded', () => {
    initPicker();
});

function initPicker() {
    const list = document.getElementById('frq-selection-list');
    if (!list) return;
    list.innerHTML = ""; 
    
    frqLibrary.forEach((frq, index) => {
        const card = document.createElement('div');
        card.className = 'frq-card';
        const badge = frq.stimulus ? `<span style="font-size:0.7rem; background:#e0e7ff; color:#4338ca; padding:2px 6px; border-radius:4px; margin-left:8px;">STIMULUS</span>` : "";
        card.innerHTML = `<strong>${index + 1}.</strong> ${frq.title} ${badge}`;
        card.onclick = () => startFRQ(index);
        list.appendChild(card);
    });
}

function startFrqTimer() {
    // Reset if a timer is already running
    if (frqTimerInterval) clearInterval(frqTimerInterval);
    
    seconds = 0;
    const timerDisplay = document.getElementById('frq-timer');
    timerDisplay.innerText = "Time: 00:00";
    
    frqTimerInterval = setInterval(() => {
        seconds++;
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        
        let displayMins = mins < 10 ? "0" + mins : mins;
        let displaySecs = secs < 10 ? "0" + secs : secs;
        
        timerDisplay.innerText = `Time: ${displayMins}:${displaySecs}`;
    }, 1000);
}

function startFRQ(index) {
    if (index === -1) {
        activeFrq = frqLibrary[Math.floor(Math.random() * frqLibrary.length)];
    } else {
        activeFrq = frqLibrary[index];
    }
    
    // UI Transitions
    document.getElementById('setup-frq').classList.add('hidden');
    document.getElementById('frq-work-area').classList.remove('hidden');
    document.getElementById('frq-input').value = ""; 
    document.getElementById('frq-title').innerText = activeFrq.title;
    document.getElementById('frq-prompt').innerHTML = activeFrq.prompt;
    
    // Handle Stimulus Display
    const stimContainer = document.getElementById('frq-stimulus-container');
    stimContainer.innerHTML = ""; 
    
    if (activeFrq.type === "image") {
        stimContainer.innerHTML = `<img src="${activeFrq.stimulus}" style="max-width:100%; border:2px solid #e2e8f0; border-radius:8px; display:block; margin:auto;"><p style="font-size:0.85rem; color:#64748b; text-align:center; margin-top:10px; font-style:italic;">${activeFrq.caption}</p>`;
    } else if (activeFrq.type === "table") {
        stimContainer.innerHTML = `<div style="overflow-x:auto;">${activeFrq.stimulus}</div><p style="font-size:0.85rem; color:#64748b; text-align:center; margin-top:10px; font-style:italic;">${activeFrq.caption}</p>`;
    }

    // START THE TIMER
    startFrqTimer();
}

function gradeFRQ() {
    // STOP THE TIMER
    clearInterval(frqTimerInterval);

    const input = document.getElementById('frq-input').value.toLowerCase();
    const fbList = document.getElementById('frq-feedback-list');
    fbList.innerHTML = '';
    let earned = 0;

    activeFrq.rubric.forEach(part => {
        const hasKeywords = part.kw.some(word => input.includes(word));
        if(hasKeywords) earned++;
        const card = document.createElement('div');
        card.className = 'feedback-card';
        card.style.borderLeft = hasKeywords ? '5px solid var(--success)' : '5px solid var(--danger)';
        card.innerHTML = `<strong>Part ${part.id}</strong>: ${hasKeywords ? 'Point Awarded' : 'Key terminology missing'}`;
        fbList.appendChild(card);
    });

    document.getElementById('frq-work-area').classList.add('hidden');
    document.getElementById('frq-results').classList.remove('hidden');
    document.getElementById('final-score-display').innerText = `${earned} / ${activeFrq.rubric.length}`;
}
</script>
